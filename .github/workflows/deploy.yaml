name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [gas-data-changed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache downloaded assets
        uses: actions/cache@v4
        with:
          path: |
            public/images/thumbs
            public/data/pdfs
          key: gas-assets-${{ github.sha }}
          restore-keys: |
            gas-assets-

      - name: Fetch latest data from GAS
        run: npm run publish-data

      - name: Build Astro
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
